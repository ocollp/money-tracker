name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci && npm install --no-save @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /money-tracker/
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SPREADSHEET_ID: ${{ secrets.VITE_SPREADSHEET_ID }}
          VITE_SPREADSHEET_ID_2: ${{ secrets.VITE_SPREADSHEET_ID_2 }}
          VITE_MORTGAGE_END_YEAR: ${{ secrets.VITE_MORTGAGE_END_YEAR }}
          VITE_MORTGAGE_END_MONTH: ${{ secrets.VITE_MORTGAGE_END_MONTH }}
          VITE_MORTGAGE_MONTHLY_PAYMENT: ${{ secrets.VITE_MORTGAGE_MONTHLY_PAYMENT }}
          VITE_OWNERSHIP_SHARE: ${{ secrets.VITE_OWNERSHIP_SHARE }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_HOUSING_EQUITY: ${{ secrets.VITE_HOUSING_EQUITY }}
          VITE_HOUSING_EQUITY_ENTITY: ${{ secrets.VITE_HOUSING_EQUITY_ENTITY }}
          VITE_TRAVEL_PATRIMONY_SHARE: ${{ secrets.VITE_TRAVEL_PATRIMONY_SHARE }}
          VITE_TRAVEL_MONTHLY_SAVING: ${{ secrets.VITE_TRAVEL_MONTHLY_SAVING }}
          VITE_ASSUMED_UNEMPLOYMENT: ${{ secrets.VITE_ASSUMED_UNEMPLOYMENT }}

      - name: Fix SPA routing for GitHub Pages
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
